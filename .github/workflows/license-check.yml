name: Dependency License Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review (License & Vulnerability Policy)
        id: dependency-review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          license-check: true
          vulnerability-check: true
          allow-licenses: >-
            MIT, MIT-0,
            BSD-2-Clause, BSD-2-Clause-Views, BSD-3-Clause, 0BSD,
            Apache-1.0, Apache-1.1, Apache-2.0,
            ISC, BlueOak-1.0.0, MPL-2.0,
            CC0-1.0, CC-BY-4.0,
            Python-2.0
          # Packages excluded from license checks — LGPL reviewed and approved:
          # - sharp-libvips-*: native binaries, consumed via dynamic linking only
          # - sharp-win32/wasm*: same rationale
          # - @wavenet/cookie-law: LGPL-3.0, monitor if bundling pattern changes
          # - astro-compress → CC0-1.0 (confirmed on the GitHub org page)
          # - @playform/pipe → MIT (referenced in the package's own README example)
          allow-dependencies-licenses: >-
            pkg:npm/%40img/sharp-libvips-darwin-arm64,
            pkg:npm/%40img/sharp-libvips-darwin-x64,
            pkg:npm/%40img/sharp-libvips-linux-arm,
            pkg:npm/%40img/sharp-libvips-linux-arm64,
            pkg:npm/%40img/sharp-libvips-linux-ppc64,
            pkg:npm/%40img/sharp-libvips-linux-riscv64,
            pkg:npm/%40img/sharp-libvips-linux-s390x,
            pkg:npm/%40img/sharp-libvips-linux-x64,
            pkg:npm/%40img/sharp-libvips-linuxmusl-arm64,
            pkg:npm/%40img/sharp-libvips-linuxmusl-x64,
            pkg:npm/%40img/sharp-wasm32,
            pkg:npm/%40img/sharp-win32-arm64,
            pkg:npm/%40img/sharp-win32-ia32,
            pkg:npm/%40img/sharp-win32-x64,
            pkg:npm/%40wavenet/cookie-law
            pkg:npm/%40playform/pipe,
            pkg:npm/astro-compress

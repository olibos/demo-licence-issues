name: Dependency License Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review (License & Vulnerability Policy)
        id: dependency-review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          license-check: true
          vulnerability-check: true
          allow-licenses: MIT, BSD-2-Clause, BSD-3-Clause, 0BSD, Apache-1.0, Apache-1.1, Apache-2.0, ISC, BlueOak-1.0.0, MPL-2.0
